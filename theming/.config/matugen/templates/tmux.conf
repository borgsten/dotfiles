# Matugen generated colors for tmux

set -g @theme-bg "{{colors.surface.default.hex}}"
set -g @theme-fg "{{colors.on_surface.default.hex}}"

# UI element colors
set -g @message-bg "{{colors.surface_container.default.hex}}"
set -g @message-fg "{{colors.on_surface.default.hex}}"
set -g @border-inactive "{{colors.outline.default.hex}}"
set -g @border-active "{{colors.primary.default.hex}}"
set -g @activity-color "{{colors.secondary.default.hex}}"
set -g @window-inactive-fg "{{colors.on_surface_variant.default.hex}}"

# Feature colors (semantic)
set -g @session-color "{{colors.primary.default.hex}}"
set -g @folder-color "{{colors.secondary.default.hex}}"
set -g @window-active-color "{{colors.primary.default.hex}}"
set -g @mode-bg "{{colors.tertiary.default.hex}}"
set -g @mode-fg "{{colors.on_tertiary.default.hex}}"
set -g @clock-color "{{colors.primary.default.hex}}"
set -g @git-color "{{colors.tertiary.default.hex}}"
